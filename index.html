<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card Generator</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- html2canvas -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<div class="container">

    <!-- FORM -->
    <div class="form-section">

        <h2>Digital Business Card Generator</h2>

        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Job Title</label>
        <input type="text" id="job" placeholder="Software Engineer">

        <label>Company</label>
        <input type="text" id="company" placeholder="Company Name">

        <label>Email</label>
        <input type="email" id="email" placeholder="example@email.com">

        <label>Phone</label>
        <input type="text" id="phone" placeholder="+91 9876543210">

        <label>Website</label>
        <input type="text" id="website" placeholder="https://">

        <label>LinkedIn</label>
        <input type="text" id="linkedin" placeholder="LinkedIn URL">

        <label>GitHub</label>
        <input type="text" id="github" placeholder="GitHub URL">

        <label>Location</label>
        <input type="text" id="location" placeholder="City, Country">

        <label>Profile Image</label>
        <input type="file" id="image" accept="image/*">

        <label>Select Template</label>

        <select id="template">
            <option value="template1">Classic</option>
            <option value="template2">Dark</option>
            <option value="template3">Gradient</option>
        </select>

        <button id="generateBtn">Generate Card</button>

        <div class="download-buttons">
            <button id="downloadPNG">Download PNG</button>
            <button id="downloadPDF">Download PDF</button>
        </div>

    </div>


    <!-- CARD PREVIEW -->

    <div class="preview-section">

    <div>
         <h2 class="preview-title">Business Card</h2>
       

        <div id="card" class="card template1">

        

          <img src="assets/avatar.jpg" id="previewImage">

            <h2 id="previewName">Your Name</h2>

            <h4 id="previewJob">Job Title</h4>

            <p id="previewCompany">Company</p>

            <div class="info">

                <p>
                    <i class="fa-solid fa-envelope"></i>
                    <span id="previewEmail">email@example.com</span>
                </p>

                <p>
                    <i class="fa-solid fa-phone"></i>
                    <span id="previewPhone">+91 XXXXX XXXXX</span>
                </p>

                <p>
                    <i class="fa-solid fa-location-dot"></i>
                    <span id="previewLocation">Location</span>
                </p>

                <p>
                    <i class="fa-solid fa-globe"></i>
                    <span id="previewWebsite">Website</span>
                </p>

            </div>

            <div class="socials">

                <a id="previewLinkedIn" href="#" target="_blank">
                    <i class="fab fa-linkedin"></i>
                </a>

                <a id="previewGithub" href="#" target="_blank">
                    <i class="fab fa-github"></i>
                </a>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
